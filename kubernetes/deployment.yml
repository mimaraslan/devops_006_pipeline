apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-006-pipeline
  labels:
    app: devops-006-pipeline
    team: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-006-pipeline
  template:
    metadata:
      labels:
        app: devops-006-pipeline
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: devops-006-pipeline
        image: mimaraslan/devops-006-pipeline:latest
        imagePullPolicy: "Always"
        resources:
          limits:
            memory: "1000Mi"
            cpu: "1000m"
        ports:
        - containerPort: 3000